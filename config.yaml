paths:
  model_path: "input/Juggernaut-XL_v9_RunDiffusionPhoto_v2.safetensors"

image_generation:
  width: 1024
  height: 1024

  steps: 30

  cfg: 7.0

  seed: 42

  negative_prompt: >
    worst quality,
    low quality,
    blurry,
    bad anatomy,
    deformed,
    distorted,
    watermark,
    text

language_transcribe: "ja"

extract_promt_gpt: 'You are a Japanese linguistic extraction engine.

INPUT

=== WORD.JSON by Whisper ===
{word.json}
=== END WORD.JSON ===

=== SONG.LRC ===
{lyrics.lrc}
=== END SONG.LRC ===

TASK

This is a data extraction task.

This is NOT a summarization task.

This is NOT a vocabulary selection task.

You must extract ALL unique Japanese lemmas appearing in the lyrics.

SOURCE PRIORITY

* LRC is authoritative for text.
* word.json is authoritative for timings.

PROCESS

1. Parse all lyrics.
2. Correct Whisper mistakes using lyrics.
3. Perform Japanese morphological analysis.
4. Extract all unique lemmas.
5. Keep the first meaningful occurrence of every lemma.
6. Find word and sentence timings.

INCLUDE

* nouns
* verbs
* i-adjectives
* na-adjectives
* adverbs
* pronouns
* interjections

EXCLUDE

* particles
* You are a Japanese linguistic extraction engine.

OUTPUT

Return ONLY valid JSON.

[
{
"surface": "",
"lemma": "",
"sentence": "",
"word_start": 0.0,
"word_end": 0.0,
"sentence_start": 0.0,
"sentence_end": 0.0
}
]

TIMING RULES

word_start:
Beginning of the word.

word_end:
End of the word.

sentence_start:
Beginning of lyric line.

sentence_end:
End of lyric line.

Estimate timings from aligned Whisper words.

CRITICAL REQUIREMENT

Extract ALL unique lemmas.

Do not select representative examples.

Do not summarize.

Every unique lemma must appear exactly once.

'


prompt_cards_gen: 'You are an expert Japanese vocabulary card generator.
=== CARDS.JSON ===
{cards.json}
=== END CARDS.JSON ===

SONG CONTEXT

=== SONG.LRC ===
{song.lrc}
=== END SONG.LRC ===

TASK

Analyze Song.lrc and generate a JSON array of vocabulary cards.

Determine for each card:

* contextual meaning
* furigana of the lemma
* part of speech
* Russian translation
* sentence translation
* grammar analysis
* generate image prompt

Translation rules:

* First translation must be the meaning used in the song context.
* Additional meanings may follow.
* Do not sort by frequency.
* Sort by contextual relevance.

Sentence translation:
Natural Russian translation.
Do not translate literally.
Preserve emotional meaning.

GRAMMAR ANALYSIS RULES

For every sentence perform a full grammatical analysis.

Identify:

particles
verb conjugations
adjective conjugations
auxiliary verbs
contractions
grammatical patterns
sentence-ending expressions
politeness forms

Do NOT explain ordinary nouns or vocabulary.

Only explain grammar.

For every grammar point provide:

surface form
category
grammar name
detailed Russian explanation
role in this specific sentence

Generate:

grammar_points as a structured JSON array.

IMAGE PROMPT RULES

Generate image_prompt optimized for Juggernaut-XL_v9_RunDiffusionPhoto_v2.

The purpose is MEMORY RETENTION, not beauty.

The image must create a strong visual association with the vocabulary word.

Prioritize:

1. Memorability
2. Unique silhouette
3. Strong symbolism
4. Strong contrast
5. Emotional impact
6. Context relevance

Avoid:

* generic people
* crowds
* ordinary portraits
* stock-photo compositions
* repetitive faces

Prefer:

* fantasy creatures
* surreal scenes
* giant symbolic objects
* magical effects
* exaggerated proportions
* unique shapes
* visual metaphors


If the song context contains romance, violence, horror or NSFW themes, reflect them appropriately.

The generated prompt must:

* be written in English
* be highly detailed
* be visually specific
* describe one dominant composition
* contain no explanations

OUTPUT

Return ONLY valid JSON.

{
"lemma": "",
"furigana": "",
"part_of_speech": "",
"translation": "",
"sentence": "",
"sentence_ru": "",
"grammar_points": [],
"image_prompt": ""
}


'

prompt_validator: '
You are a Japanese language quality assurance engine.

Review every generated card.

Verify:

* lemma correctness
* furigana correctness
* contextual translation
* sentence translation
* grammar analysis
* part of speech

Fix any errors.

Return corrected JSON.

Do not add explanations.

'